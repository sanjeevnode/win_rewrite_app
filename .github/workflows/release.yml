name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint-unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint shell and Lua sources
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck lua5.4
          bash -n linux/gemini-rewrite.sh linux/install.sh macos/install.sh
          shellcheck linux/gemini-rewrite.sh linux/install.sh macos/install.sh
          luac5.4 -p macos/gemini-rewrite.lua

  build-release:
    needs: lint-unix
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey v2 and Ahk2Exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force build\tools | Out-Null
          # AutoHotkey v2 (base binaries for compilation)
          Invoke-WebRequest "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.26/AutoHotkey_2.0.26.zip" -OutFile build\ahk.zip
          Expand-Archive build\ahk.zip build\tools\ahk
          # Latest Ahk2Exe compiler
          $url = gh api repos/AutoHotkey/Ahk2Exe/releases/latest --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url'
          Invoke-WebRequest $url -OutFile build\ahk2exe.zip
          Expand-Archive build\ahk2exe.zip build\tools\ahk2exe

      - name: Compile rewrite.exe and setup.exe
        shell: pwsh
        run: |
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          (Get-Content windows\installer.ahk -Raw) -replace '0\.0\.0-dev', $ver | Set-Content windows\installer.ahk
          $ahk2exe = (Get-ChildItem build\tools\ahk2exe -Recurse -Filter Ahk2Exe.exe | Select-Object -First 1).FullName
          $base = (Get-ChildItem build\tools\ahk -Recurse -Filter AutoHotkey64.exe | Select-Object -First 1).FullName
          & $ahk2exe /silent verbose /in windows\rewrite.ahk /out windows\rewrite.exe /base $base | Out-String
          if (-not (Test-Path windows\rewrite.exe)) { throw "rewrite.exe compilation failed" }
          # installer embeds rewrite.exe via FileInstall (must be in same dir)
          # Ahk2Exe resolves a relative /out against the script's directory
          & $ahk2exe /silent verbose /in windows\installer.ahk /out GeminiRewriteSetup.exe /base $base | Out-String
          if (-not (Test-Path windows\GeminiRewriteSetup.exe)) { throw "setup compilation failed" }

      - name: Package macOS and Linux versions
        shell: pwsh
        run: |
          Compress-Archive -Path macos\* -DestinationPath gemini-rewrite-macos.zip
          tar -czf gemini-rewrite-linux.tar.gz -C linux gemini-rewrite.sh install.sh README.md

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            windows\GeminiRewriteSetup.exe `
            windows\rewrite.exe `
            windows\config.example.ini `
            gemini-rewrite-macos.zip `
            gemini-rewrite-linux.tar.gz `
            --title "Gemini Rewrite $env:GITHUB_REF_NAME" `
            --generate-notes

  macos-dmg:
    needs: build-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build installer app and DMG
        run: |
          osacompile -o "Gemini Rewrite Installer.app" macos/installer.applescript
          cp macos/gemini-rewrite.lua "Gemini Rewrite Installer.app/Contents/Resources/"
          mkdir dmgroot
          cp -R "Gemini Rewrite Installer.app" dmgroot/
          cp macos/README.md dmgroot/README.md
          hdiutil create -volname "Gemini Rewrite" -srcfolder dmgroot -ov -format UDZO gemini-rewrite-macos.dmg

      - name: Upload DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" gemini-rewrite-macos.dmg --clobber
